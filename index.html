<!DOCTYPE html>

<head>

    <header class="header">
        <h1>JSON2Tree</h1>
                <input type="text" placeholder="Search for files...">&#128269;

    <section class="home">

        <p>Convert your JSON data into a visual tree structure.</p>

        <button class="btn" onclick="generateTree()">Convert to Tree</button>
        <button class="btn" onclick="clearEg()">Clear</button>

        </div>
    </div>
