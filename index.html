<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON2Tree</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <h1>JSON2Tree</h1>
    </header>
    <section class="home">
    <div class="container1">
        <p>Convert your JSON data into a visual tree structure.</p>
        <div class="text">
        <textarea id="jsonInput" placeholder="Enter JSON here..."></textarea>
        </div>
        <button class="btn" id="convert-btn">Convert to Tree</button>
        <button class="btn" id="clear-btn">Clear</button>
    </div>
    <div class="container2">
         <input id="searchInput" class="search" type="text" placeholder="Search for files..." >
            <span class="search-icon">&#128269;</span>
        <input id="filterSearch" class="search" type="text" placeholder="Filter files...">
            <span class="search-icon">&#128269;</span>
        <h2>Folder Structure</h2>
        <div id="output"></div>
    </div>
    </section>
    <footer class="footer">
        <p>&copy; 2026 JSON2Tree. All rights reserved.</p>
    </footer>
    <script type="module" src="scripts/script.js"></script>
</body>
</html>
